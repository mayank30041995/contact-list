version: "3"

services:
  backend:
    build: .
    ports:
      - "8000:8000"

  frontend:
    build: ./client
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
