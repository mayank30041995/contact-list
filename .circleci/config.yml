version: 2.1

jobs:
deploy:
machine: true

```
steps:
  - checkout

  - run:
      name: Install SSH Client
      command: |
        sudo apt-get update
        sudo apt-get install -y openssh-client

  - add_ssh_keys

  - run:
      name: Deploy to EC2
      command: |
        ssh -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_IP << 'EOF'
          cd ~/contact-list

          git pull origin main

          docker compose down

          docker compose up -d --build
        EOF
```

workflows:
version: 2

deploy_pipeline:
jobs:
- deploy
